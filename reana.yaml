version: 0.9.0

inputs:
 files:
   - scarlet_solver.py
   - codemeta.json
 parameters:
   mode_ratio: 0.951289
   relaxation_time: 1e-41
   redshift_cutoff: 1.5

workflow:
 type: serial
 specification:
   steps:
     - name: scarlet_11d_closure
       environment: 'docker.io/reanahub/reana-env-python:3.11'
       commands:
         - mkdir -p results
         - python scarlet_solver.py --ratio ${inputs.parameters.mode_ratio} --t_v ${inputs.parameters.relaxation_time} --zf ${inputs.parameters.redshift_cutoff}

outputs:
 files:
   - results/h0_correction.csv
   - results/s8_suppression_curve.png
